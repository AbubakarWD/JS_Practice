<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions with Parameters</title>
</head>

<body>
    <script>
        function info(Fname = "A", Lname = "k") {
            document.write(Fname + Lname);
        }
        info();
        info("Abu ", "khan");

        function sum(a, b) {
            document.write(a + b);
        }
        sum(20, 30);
    </script>
</body>

</html>
