<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>do while loop</title>
</head>

<body>
    <script>
        var a = 1;
        do {
            document.write("Hello");
            document.write("<br>");
            a = a + 1;
        }
        while (a <= 10)
    </script>
</body>


</html>
