<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>Find even and odd number with loops</h3>
    <script>
        for (b = 1; b <= 100; b++) {
            if (b % 2 == 0) {
                document.write(b + "<br>");
            }
        }
        for (b = 1; b <= 100; b++) {
            if (b % 3 == 0) {
                document.write(b + "<br>");
            }
        }
        for (b = 1; b <= 100; b++) {
            if (b % 2 != 0) {
                document.write(b + "<br>");
            }
        }
    </script>
</body>

</html>
