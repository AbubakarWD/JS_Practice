<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break and Continue</title>
</head>

<body>
    <script>
        for (a = 1; a <= 10; a++) {
            document.write("Number : " + a + "<br>");
            if (a == 4) {
                document.write("Hello " + a + "<br>");
                // continue;
            }
            if (a == 7) {
                document.write("Hello " + a + "<br>");
                // break;
            }
        }
    </script>
</body>

</html>
