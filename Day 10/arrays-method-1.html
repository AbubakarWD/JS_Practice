<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Method 1</title>
</head>

<body>
    <script>
        var arr = [10, 25, 30, 72, 68];
        var sum;
        for (a = 0; a <= 4; a++)
            document.write(arr[a] + "<br>");
        sum = sum + arr[a];
        document.write(sum);
    </script>
</body>

</html>
