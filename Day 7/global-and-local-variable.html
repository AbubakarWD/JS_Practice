<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global and local Variable</title>
</head> 
<body>
    <script>
        var a="Hello";
        function sum()
        {
            document.write(a);
            var b="Hi";
            document.write("<br>");
            document.write(b);
        }
        sum();
        document.write(b);
    </script>
</body>
</html>
